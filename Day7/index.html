<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Forms in HTML</h1>
    <input type="text" placeholder="Enter username" required>
    <input type="password" placeholder="Password" required>
    <input type="submit" value="log-in">
    <input type="date">
    <input type="datetime">
    <input type="datetime-local">

    <h2>GENDER</h2>
    <input type="radio" name="gender" id="male">

    <label for="male">Male</label>
    <input type="radio" name="gender" id="female">
    <label for="female">FeMale</label>
    <input type="radio" name="gender" id="Others">
    <label for="Others">Others</label>

    <h3>Hobbies</h3>
    <input type="checkbox" name="hobbies" id="Cricket">
    <label for="Cricket">Cricket</label>
    <input type="checkbox" name="hobbies" id="listening music">
    <label for="listening music">listening music</label>
    <input type="checkbox" name="hobbies" id="sleeping">
    <label for="sleeping">sleeping</label>

    <select name="" id="">
        <option value="">English</option>
        <option value="">Telugu</option>
        <option value="">Hindi</option>
    </select>

    <textarea name="" id="" rows="30" cols="20"></textarea>
</body>
</html>
